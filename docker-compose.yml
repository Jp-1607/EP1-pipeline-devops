version: '3.8'
services:
  saludo-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saludo-flask-app
    ports:
      - "5000:5000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.2"
